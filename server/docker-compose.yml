services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build: .
    depends_on:
      - qdrant
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data:ro

volumes:
  qdrant_storage:
