name: AAALionApp
options:
  bundleIdPrefix: com.aaalion
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  knownRegions: [Base, en, zh-Hans]
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Apple Developer Team ID. Defaults to Shufeng's Personal Team so
    # `aaalion ios-device` builds out of the box on his Mac. Teammates
    # should override locally with their own Personal Team's 10-char ID
    # before deploying to their own iPhones (see docs/DEPLOY_GUIDE.md §4).
    #
    # NOTE on Personal Teams: the 10-char string shown in Xcode after your
    # email (e.g. "Apple Development: foo@bar.com (XXXXXXXXXX)") is a
    # *certificate* identifier, NOT the team identifier. The real team ID
    # is in the provisioning profile's TeamIdentifier field — read it with
    # `security cms -D -i <profile.mobileprovision> | grep -A1 TeamIdentifier`.
    DEVELOPMENT_TEAM: "V8KDBHKA3P"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AAALionApp:
    type: application
    platform: iOS
    sources:
      - path: AAALionApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaalion.lionpick
        # ASCII product/executable name — a Chinese PRODUCT_NAME ("狮选") makes
        # the bundle executable non-ASCII, which breaks Sideloadly (it can't
        # find the executable). The home-screen name stays 狮选 via
        # CFBundleDisplayName below, so users see no change.
        PRODUCT_NAME: LionPick
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 狮选
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.shopping
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "拍照找货功能需要使用相机识别商品。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "上传图片以搜索同款商品。"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "语音输入功能需要使用麦克风。"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "将你的语音转成文字以发送查询。"
        # Dev: allow HTTP to localhost / LAN backend
        INFOPLIST_KEY_NSAppTransportSecurity: "{NSAllowsArbitraryLoads = YES;}"
        # Backend URL is hardcoded in client/AAALionApp/AAALionApp/Config.swift
        # — change the `defaultBackendURL` constant there before each LAN
        # demo session (run `ipconfig getifaddr en0` on the Mac to get the IP).
        # Signing: automatic (uses the Apple ID configured in Xcode → Settings → Accounts).
        # Simulator builds skip signing implicitly; device builds use the personal team.
        CODE_SIGN_STYLE: Automatic
