name: AAALionApp
options:
  bundleIdPrefix: com.aaalion
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AAALionApp:
    type: application
    platform: iOS
    sources:
      - path: AAALionApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaalion.lionpick
        PRODUCT_NAME: 狮选
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: 狮选
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.shopping
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "拍照找货功能需要使用相机识别商品。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "上传图片以搜索同款商品。"
        # Dev: allow HTTP to localhost / LAN backend
        INFOPLIST_KEY_NSAppTransportSecurity: "{NSAllowsArbitraryLoads = YES;}"
